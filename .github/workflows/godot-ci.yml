name: Godot CI

on:
  push:
    branches: [ main, develop ]
  pull_request:

jobs:
  lint-placeholder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Repo structure check
        run: |
          test -f README.md
          test -f project.godot
          test -d project/scenes
          test -d project/scripts
